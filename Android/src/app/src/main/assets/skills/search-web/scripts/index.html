<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <script>
      window["ai_edge_gallery_get_result"] = async function (data) {
        try {
          let params;
          try {
            params = typeof data === "string" ? JSON.parse(data) : data;
          } catch (e) {
            params = {};
          }

          const query = params.query || "";
          const numResults = params.num_results || 5;

          if (!query) {
            return JSON.stringify({ error: "Empty search query" });
          }

          // Helper: fetch via Kotlin proxy (bypasses CORS)
          async function fetchViaProxy(url, timeoutMs = 10000) {
            if (typeof window.AiEdgeGallery === 'undefined' || typeof window.AiEdgeGallery.searchProxy !== 'function') {
              throw new Error('Search proxy not available');
            }
            
            const callbackId = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            console.log('[search-web] Proxy request: ' + url + ' (id: ' + callbackId + ')');
            
            // Call Kotlin proxy
            window.AiEdgeGallery.searchProxy(url, callbackId);
            
            // Poll for result
            const startTime = Date.now();
            while (Date.now() - startTime < timeoutMs) {
              await new Promise(resolve => setTimeout(resolve, 100));
              const result = window.AiEdgeGallery.getSearchResult(callbackId);
              if (result !== undefined && result !== '') {
                if (result.startsWith('__ERROR__:')) {
                  throw new Error(result.substring(10));
                }
                // Decode base64 response
                const binaryString = atob(result);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                  bytes[i] = binaryString.charCodeAt(i);
                }
                const html = new TextDecoder('utf-8').decode(bytes);
                console.log('[search-web] Proxy success: ' + html.length + ' bytes');
                return { ok: true, text: () => Promise.resolve(html) };
              }
            }
            throw new Error('Proxy timeout');
          }

          // Helper: extract results from HTML string
          function parseHtml(html) {
            const parser = new DOMParser();
            return parser.parseFromString(html, "text/html");
          }

          // Helper: deduplicate results by URL
          function dedup(existing, newItems) {
            const seenUrls = new Set(existing.map((r) => r.url));
            return newItems.filter((r) => {
              if (seenUrls.has(r.url)) return false;
              seenUrls.add(r.url);
              return true;
            });
          }

          const allResults = [];

          // ========== 1. DuckDuckGo HTML ==========
          try {
            const ddgUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
            const ddgRes = await fetchViaProxy(ddgUrl, 10000);
            if (ddgRes.ok) {
              const html = await ddgRes.text();
              const doc = parseHtml(html);

              // Try .web-result-info first
              let resultElements = doc.querySelectorAll(".web-result-info");
              // Fallback to .result
              if (resultElements.length === 0) {
                resultElements = doc.querySelectorAll(".result");
              }

              for (let i = 0; i < resultElements.length; i++) {
                const el = resultElements[i];
                const titleEl = el.querySelector(".result__a");
                const snippetEl = el.querySelector(".result__snippet");
                const urlEl = el.querySelector(".result__url");

                const title = titleEl ? titleEl.textContent.trim() : "";
                const snippet = snippetEl ? snippetEl.textContent.trim() : "";
                const url = urlEl ? urlEl.textContent.trim() : "";

                if (title) {
                  allResults.push({ title, snippet, url, source: "DuckDuckGo" });
                }
              }
              console.log("[search-web] DuckDuckGo results:", allResults.length);
            }
          } catch (e) {
            console.warn("[search-web] DuckDuckGo failed:", e.message);
          }

          // ========== 2. Bing HTML (fallback) ==========
          if (allResults.length < numResults) {
            try {
              const bingUrl = `https://www.bing.com/search?q=${encodeURIComponent(query)}&count=${numResults}`;
              const bingRes = await fetchViaProxy(bingUrl, 8000);
              if (bingRes.ok) {
                const html = await bingRes.text();
                const doc = parseHtml(html);

                // Bing results are in .b_algo elements
                const bingElements = doc.querySelectorAll(".b_algo");
                const bingItems = [];
                for (let i = 0; i < bingElements.length; i++) {
                  const el = bingElements[i];
                  const titleEl = el.querySelector("h2 a");
                  const snippetEl = el.querySelector(".b_caption p");
                  const urlEl = el.querySelector("h2 a");

                  const title = titleEl ? titleEl.textContent.trim() : "";
                  const snippet = snippetEl ? snippetEl.textContent.trim() : "";
                  const url = urlEl ? urlEl.getAttribute("href") : "";

                  if (title && url && !url.startsWith("about:")) {
                    bingItems.push({ title, snippet, url, source: "Bing" });
                  }
                }

                const unique = dedup(allResults, bingItems);
                allResults.push(...unique);
                console.log("[search-web] Bing added:", unique.length, "results");
              }
            } catch (e) {
              console.warn("[search-web] Bing failed:", e.message);
            }
          }

          // ========== 3. Baidu HTML (fallback) ==========
          if (allResults.length < numResults) {
            try {
              const baiduUrl = `https://www.baidu.com/s?wd=${encodeURIComponent(query)}&rn=${numResults}`;
              const baiduRes = await fetchViaProxy(baiduUrl, 8000);
              if (baiduRes.ok) {
                const html = await baiduRes.text();
                const doc = parseHtml(html);

                // Baidu results are in .c-container (new) or .result (old)
                let baiduElements = doc.querySelectorAll(".c-container");
                if (baiduElements.length === 0) {
                  baiduElements = doc.querySelectorAll(".result");
                }

                const baiduItems = [];
                for (let i = 0; i < baiduElements.length; i++) {
                  const el = baiduElements[i];
                  const titleEl = el.querySelector("h3 a") || el.querySelector(".t a");
                  const snippetEl = el.querySelector(".content") || el.querySelector(".c-abstract");
                  const urlEl = el.querySelector("h3 a") || el.querySelector(".t a");

                  const title = titleEl ? titleEl.textContent.trim() : "";
                  const snippet = snippetEl ? snippetEl.textContent.trim() : "";
                  const url = urlEl ? urlEl.getAttribute("href") : "";

                  if (title) {
                    baiduItems.push({ title, snippet, url, source: "Baidu" });
                  }
                }

                const unique = dedup(allResults, baiduItems);
                allResults.push(...unique);
                console.log("[search-web] Baidu added:", unique.length, "results");
              }
            } catch (e) {
              console.warn("[search-web] Baidu failed:", e.message);
            }
          }

          // ========== Build response ==========
          const finalResults = allResults.slice(0, numResults);

          if (finalResults.length === 0) {
            return JSON.stringify({
              error: `No results found for '${query}'. All search engines failed (DuckDuckGo, Bing, Baidu).`,
            });
          }

          const responsePayload = JSON.stringify({
            result: JSON.stringify({
              query: query,
              count: finalResults.length,
              results: finalResults,
            }),
          });
          console.log("[search-web] Returning search results:", responsePayload);
          return responsePayload;
        } catch (err) {
          return JSON.stringify({ error: err.message });
        }
      };
    </script>
  </body>
</html>
